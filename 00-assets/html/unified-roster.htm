<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unified Roster</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    :root {
      --team-color: #111b36;
      --team-color-2: #1d3666;
      --ink: #111318;
      --paper: #f4f2ec;
      --card: #ffffff;
      --line: #d9d2c2;
      --muted: #5a5246;
      --font-sans: "Graphik", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-serif: "Tiempos Headline", "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-sans);
      overflow-x: visible;
    }
    .shell {
      width: min(1250px, 100%);
      margin: 0;
      display: grid;
      gap: 0.9rem;
      overflow-x: auto;
      padding-bottom: 0.2rem;
    }
    .hero {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 0.9rem;
      align-items: center;
      background: linear-gradient(90deg, var(--team-color), #06080f);
      color: #fff;
      border: 1px solid #000;
      padding: 0.5rem 0.75rem;
    }
    .logo {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.45);
      object-fit: cover;
      background: rgba(255, 255, 255, 0.12);
    }
    .logo-fallback {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.45);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.08);
    }
    .logo-stack {
      display: grid;
      justify-items: center;
      gap: 0.28rem;
    }
    .gm-link {
      color: rgba(255, 255, 255, 0.94);
      font-size: 0.66rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 1px dotted rgba(255, 255, 255, 0.55);
      line-height: 1.1;
      white-space: nowrap;
    }
    .gm-link:hover {
      color: #fff;
      border-bottom-color: #fff;
    }
    .team-name {
      font-family: var(--font-serif);
      font-size: clamp(1.3rem, 2.6vw, 1.8rem);
      margin: 0 0 0.12rem;
      line-height: 1.1;
    }
    .team-sub {
      margin: 0;
      color: rgba(255, 255, 255, 0.88);
      line-height: 1.35;
      font-size: 0.84rem;
    }
    .hero-pills {
      margin-top: 0.28rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.38rem;
    }
    .injury-pill {
      display: inline-flex;
      gap: 0.4rem;
      align-items: center;
      padding: 0.18rem 0.34rem;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
    }
    .injury-pill a {
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    .injury-pill a:hover {
      text-decoration: underline;
    }
    .injury-pill-days {
      color: #ffd5d5;
      font-weight: 700;
      white-space: nowrap;
    }
    .hero-actions {
      display: grid;
      gap: 0.45rem;
      justify-items: end;
    }
    .team-picker, .btn-link {
      font: inherit;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 0.3rem 0.45rem;
      min-width: 220px;
      text-decoration: none;
    }
    .team-picker {
      background: #ffffff;
      color: #111318;
      border-color: rgba(0, 0, 0, 0.28);
    }
    .team-picker option {
      background: #ffffff;
      color: #111318;
    }
    .btn-link:hover { background: rgba(255, 255, 255, 0.18); }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-top: 4px solid var(--team-color);
      box-shadow: 4px 4px 0 rgba(17, 27, 54, 0.08);
      padding: 0.85rem;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 0.7rem;
      align-items: center;
      margin-bottom: 0.65rem;
      flex-wrap: wrap;
    }
    .panel-title {
      margin: 0;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--team-color);
    }
    .tabs {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid var(--line);
      background: #faf8f2;
      color: var(--muted);
      font: inherit;
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.5rem;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--team-color);
      border-color: var(--team-color);
      color: #fff;
    }
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      border: 1px solid var(--line);
      box-shadow: inset -14px 0 14px -14px rgba(17, 27, 54, 0.1);
    }
    table.data-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    /*
      styles.css sets `table { overflow: hidden }` which breaks position:sticky on cells
      (sticky cannot escape the table's scrollport). Classic roster uses a wrapper + visible overflow.
    */
    table.data-table#playerTable,
    table.data-table#statsTable {
      overflow: visible;
      border-radius: 0;
      box-shadow: none;
      width: max-content !important;
      max-width: none !important;
      min-width: 900px;
      table-layout: auto !important;
    }
    .data-table th,
    .data-table td {
      border-bottom: 1px solid var(--line);
      padding: 0.42rem 0.45rem;
      font-size: 0.86rem;
      white-space: nowrap;
      text-align: center;
    }
    .data-table th {
      background: var(--team-color);
      color: #fff;
      font-size: 0.64rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      z-index: 2;
      cursor: pointer;
      user-select: none;
    }
    .data-table td:first-child,
    .data-table th:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      background: #f5f2eb;
      z-index: 1;
      min-width: 240px;
      width: 240px;
    }
    .data-table th:first-child { background: var(--team-color); z-index: 3; }
    .data-table th.sort-asc::after { content: " ▲"; font-size: 0.58rem; }
    .data-table th.sort-desc::after { content: " ▼"; font-size: 0.58rem; }
    .player-name-link {
      color: inherit;
      text-decoration: none;
    }
    .player-name-link:hover {
      color: var(--team-color);
      text-decoration: underline;
    }
    .stat-leader {
      font-weight: 800;
      color: var(--team-color);
    }
    #playerTable.data-table th:first-child,
    #playerTable.data-table td:first-child,
    #statsTable.data-table th:first-child,
    #statsTable.data-table td:first-child {
      min-width: 216px;
      width: 216px;
    }
    #playerTable.has-number-first th:nth-child(2),
    #playerTable.has-number-first td:nth-child(2) {
      min-width: 172px;
      width: 172px;
      text-align: left;
    }
    #playerTable.has-number-first th:first-child,
    #playerTable.has-number-first td:first-child {
      min-width: 52px;
      width: 52px;
    }
    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      display: inline-block;
      border: 1px solid rgba(0, 0, 0, 0.25);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.9rem;
    }
    .top-modules {
      display: grid;
      grid-template-columns: minmax(460px, 560px) minmax(0, 1fr);
      gap: 0.9rem;
      align-items: stretch;
    }
    .top-modules > .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }
    .top-modules .table-wrap.season-info-scroll {
      flex: 1;
      min-height: 0;
      min-width: 0;
      display: flex;
      align-items: flex-start;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    #seasonInfoTable {
      min-width: 0;
      width: 100%;
      table-layout: fixed;
    }
    #seasonInfoTable th:first-child,
    #seasonInfoTable td:first-child {
      min-width: 0;
      width: 96px;
      max-width: 104px;
      position: static;
      left: auto;
      z-index: auto;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      text-align: left;
      hyphens: auto;
    }
    #seasonInfoTable th,
    #seasonInfoTable td {
      padding: 0.34rem 0.28rem;
      font-size: 0.8rem;
    }
    .schedule-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.55rem;
    }
    .month-nav {
      border: 1px solid var(--line);
      background: #f6f4ee;
      color: var(--ink);
      font: inherit;
      padding: 0.3rem 0.45rem;
      cursor: pointer;
    }
    .month-title {
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.95rem;
    }
    .schedule-view-toggle {
      display: flex;
      gap: 0.25rem;
      justify-content: center;
      margin: 0 0 0.55rem;
    }
    .schedule-view-btn {
      border: 1px solid var(--line);
      background: #f6f4ee;
      color: var(--ink);
      cursor: pointer;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      padding: 0.28rem 0.48rem;
      text-transform: uppercase;
    }
    .schedule-view-btn.active {
      background: var(--team-color);
      border-color: var(--team-color);
      color: #fff;
    }
    .calendar {
      border: 1px solid #7c7c7c;
      background: #d7d7d7;
      padding: 0.55rem;
      width: min(560px, 100%);
    }
    .weekday-grid,
    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0.32rem;
    }
    .weekday {
      text-align: center;
      font-size: 0.66rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.28rem 0;
    }
    .day-cell {
      aspect-ratio: 1 / 1;
      min-height: 0;
      border: 2px solid #b9b9b9;
      background: #ececec;
      padding: 0.08rem 0.12rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.08rem;
      cursor: default;
    }
    .day-cell.out { opacity: 0.45; }
    .day-num {
      font-weight: 800;
      font-size: 1.02rem;
      text-align: center;
      line-height: 1.02;
    }
    .day-num.home { color: #1a5f9b; }
    .day-num.away { color: #b11818; }
    .day-num-result {
      display: block;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 0.06rem;
    }
    .day-num-score {
      display: block;
      font-size: 0.66rem;
      line-height: 1;
      color: inherit;
    }
    .day-num-score-link {
      color: inherit;
      text-decoration: none;
    }
    .day-num-score-link:hover {
      text-decoration: underline;
    }
    .mini-logo-row {
      margin-top: 0.02rem;
      display: flex;
      justify-content: center;
      gap: 0.12rem;
      flex-wrap: wrap;
      min-height: 24px;
      align-items: center;
    }
    .mini-logo {
      width: 24px;
      height: 24px;
      object-fit: cover;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.35);
      background: #fff;
    }
    .mini-logo-fallback {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      font-size: 0.66rem;
      font-weight: 800;
      border: 1px solid rgba(0, 0, 0, 0.35);
      background: #fff;
      color: #111;
      line-height: 1;
    }
    .legend {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.8rem;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .swatch {
      width: 14px;
      height: 14px;
      display: inline-block;
      vertical-align: middle;
      margin: 0 0.2rem;
      border: 1px solid #7a7a7a;
    }
    .schedule-list {
      border: 1px solid #7c7c7c;
      background: #f6f4ee;
      max-height: 360px;
      overflow: auto;
      width: min(560px, 100%);
    }
    .schedule-list[hidden] { display: none; }
    .schedule-list-row {
      display: grid;
      grid-template-columns: minmax(86px, 0.85fr) 44px minmax(0, 1.35fr) minmax(70px, 0.75fr);
      gap: 0.55rem;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 0.55rem 0.6rem;
    }
    .schedule-list-row:last-child { border-bottom: 0; }
    .schedule-list-row.home { background: #eaf5ff; }
    .schedule-list-row.away { background: #fff0f0; }
    .schedule-list-date {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .schedule-list-ha,
    .schedule-list-result {
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-align: center;
      text-transform: uppercase;
    }
    .schedule-list-opponent {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
      font-family: var(--font-serif);
      font-weight: 900;
      line-height: 1.15;
    }
    .schedule-list-opponent span:last-child {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .schedule-list-result a {
      color: inherit;
      text-decoration: none;
    }
    .schedule-list-result a:hover { text-decoration: underline; }
    .status {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      min-height: 1em;
    }
    @media (max-width: 980px) {
      .hero { grid-template-columns: 70px 1fr; }
      .hero-actions { grid-column: 1 / -1; justify-items: stretch; }
      .team-picker, .btn-link { min-width: 0; width: 100%; }
      .top-modules { grid-template-columns: 1fr; }
      .top-modules .table-wrap.season-info-scroll {
        max-height: min(56vh, 520px);
      }
    }
    .panel-head-end {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.45rem;
      justify-content: flex-end;
      max-width: 100%;
    }
    .column-preset-wrap {
      display: none;
      align-items: center;
      gap: 0.28rem;
      flex-shrink: 0;
    }
    .preset-label {
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .preset-btn {
      border: 1px solid var(--line);
      background: #faf8f2;
      color: var(--muted);
      font: inherit;
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.28rem 0.38rem;
      cursor: pointer;
    }
    .preset-btn.active {
      background: var(--team-color);
      border-color: var(--team-color);
      color: #fff;
    }
    @media (max-width: 600px) {
      body { padding: 0.55rem; }
      .shell {
        gap: 0.65rem;
        min-width: 0;
        width: 100%;
        max-width: 100%;
      }
      .hero { padding: 0.45rem 0.55rem; gap: 0.55rem; }
      .logo, .logo-fallback { width: 54px; height: 54px; }
      .panel { padding: 0.62rem; }
      .panel-head { align-items: stretch; }
      .panel-head-end {
        width: 100%;
        justify-content: space-between;
      }
      .column-preset-wrap { display: flex; }
      .tabs {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        gap: 0.28rem;
        flex: 1;
        min-width: 0;
        padding-bottom: 0.15rem;
      }
      .tab-btn { flex: 0 0 auto; font-size: 0.62rem; padding: 0.32rem 0.42rem; }
      table.data-table#playerTable,
      table.data-table#statsTable {
        min-width: 720px;
        border-collapse: separate;
        border-spacing: 0;
      }
      #playerTable.data-table th,
      #playerTable.data-table td,
      #statsTable.data-table th,
      #statsTable.data-table td {
        padding: 0.32rem 0.34rem;
        font-size: 0.8rem;
      }
      #playerTable.data-table th,
      #statsTable.data-table th {
        font-size: 0.58rem;
      }
      #playerTable.data-table th:first-child,
      #playerTable.data-table td:first-child,
      #statsTable.data-table th:first-child,
      #statsTable.data-table td:first-child {
        position: sticky;
        left: 0;
        min-width: 148px;
        width: 148px;
        box-shadow: 1px 0 0 0 var(--line);
        z-index: 2;
      }
      #playerTable.data-table td:first-child,
      #statsTable.data-table td:first-child {
        z-index: 1;
        background: #f5f2eb;
      }
      #playerTable.data-table th:first-child,
      #statsTable.data-table th:first-child {
        z-index: 4;
        background: var(--team-color);
      }
      #seasonInfoTable th,
      #seasonInfoTable td {
        padding: 0.3rem 0.24rem;
        font-size: 0.76rem;
      }
      .calendar { padding: 0.42rem; }
      .weekday-grid,
      .day-grid { gap: 0.2rem; }
      .weekday { font-size: 0.58rem; padding: 0.2rem 0; }
      .day-num { font-size: 0.88rem; }
      .day-num-score { font-size: 0.58rem; }
      .mini-logo,
      .mini-logo-fallback {
        width: 20px;
        height: 20px;
        font-size: 0.58rem;
      }
      .mini-logo-row { min-height: 20px; gap: 0.08rem; }
      .top-modules {
        min-width: 0;
      }
      .top-modules > .panel {
        min-width: 0;
      }
      .shell > .panel {
        min-height: 0;
        min-width: 0;
      }
      .panel.roster-data-panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
      }
      .panel.roster-data-panel .panel-head {
        flex-shrink: 0;
      }
      .roster-table-scroll {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
        min-width: 0;
        width: 100%;
        height: min(58vh, 520px);
        max-height: min(58vh, 520px);
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        touch-action: pan-x pan-y;
        isolation: isolate;
      }
      #playerTable.data-table td:not(:first-child),
      #statsTable.data-table td:not(:first-child) {
        position: static;
        left: auto;
        z-index: auto;
      }
      #playerTable.data-table th:not(:first-child),
      #statsTable.data-table th:not(:first-child) {
        position: sticky;
        top: 0;
        left: auto;
        z-index: 2;
      }
      .schedule-panel {
        align-self: start;
      }
      .schedule-panel .calendar {
        width: 100%;
        max-width: min(280px, 92vw);
        margin-left: auto;
        margin-right: auto;
        padding: 0.28rem;
      }
      .schedule-panel .schedule-head {
        margin-bottom: 0.38rem;
      }
      .schedule-panel .month-title {
        font-size: 0.72rem;
      }
      .schedule-panel .month-nav {
        padding: 0.22rem 0.32rem;
      }
      .schedule-panel .weekday-grid,
      .schedule-panel .day-grid {
        gap: 0.12rem;
      }
      .schedule-panel .weekday {
        font-size: 0.52rem;
        padding: 0.14rem 0;
      }
      .schedule-panel .day-num {
        font-size: 0.68rem;
      }
      .schedule-panel .day-num-score {
        font-size: 0.5rem;
      }
      .schedule-panel .mini-logo,
      .schedule-panel .mini-logo-fallback {
        width: 16px;
        height: 16px;
        font-size: 0.48rem;
      }
      .schedule-panel .mini-logo-row {
        min-height: 16px;
        gap: 0.05rem;
      }
      .schedule-panel .legend {
        font-size: 0.58rem;
        gap: 0.45rem;
        margin-top: 0.35rem;
      }
      .schedule-panel .schedule-list {
        width: 100%;
        max-width: min(320px, 92vw);
        margin-left: auto;
        margin-right: auto;
      }
      .schedule-panel .schedule-list-row {
        grid-template-columns: 1fr 42px;
        gap: 0.32rem 0.45rem;
        padding: 0.48rem 0.5rem;
      }
      .schedule-panel .schedule-list-opponent {
        grid-column: 1 / -1;
        grid-row: 2;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div id="teamLogoSlot"></div>
      <div>
        <h1 class="team-name" id="teamName">Loading Team</h1>
        <p class="team-sub" id="teamSubtitle">Loading context</p>
        <div class="hero-pills" id="heroInjuryPills"></div>
      </div>
      <div class="hero-actions">

  <script src="../js/player-page-destination.js"></script>
  <script src="../js/roster-data-service.js"></script>
  <script>

    const COLUMN_PRESET_KEY = "unifiedRosterColumnPreset";
    const COLUMN_PRESET_MQ = "(max-width: 600px)";

    function readColumnPreset() {
      try {
        const v = localStorage.getItem(COLUMN_PRESET_KEY);
        return v === "essential" ? "essential" : "full";
      } catch {
        return "full";
      }
    }

    function isNarrowForColumnPreset() {
      return typeof window !== "undefined" && window.matchMedia && window.matchMedia(COLUMN_PRESET_MQ).matches;
    }

    function essentialColumnIndices(headers, nameColumnIndex) {
      const maxCols = 10;
      const picked = [];
      const add = (i) => {
        if (!Number.isInteger(i) || i < 0 || i >= headers.length) return;
        if (!picked.includes(i)) picked.push(i);
      };
      add(0);
      if (Number.isInteger(nameColumnIndex) && nameColumnIndex >= 0) add(nameColumnIndex);
      for (let i = 0; i < headers.length && picked.length < maxCols; i += 1) add(i);
      return picked.sort((a, b) => a - b);
    }

    const state = {
      standings: [],
      teams: [],
      players: [],
      playerStats: [],
      scheduleSections: [],
      injuries: [],
      coachesByRoster: {},
      teamDirectory: [],
      current: null,
      parsedSections: {},
      playerMode: "attributes",
      statsMode: "Season Stats",
      monthCursor: null,
      scheduleView: "calendar",
      columnPreset: readColumnPreset()
    };
    const PAGE_VIEWPORT = "width=device-width, initial-scale=1.0";
    let parentViewportMeta = null;
    let parentViewportPrevious = null;

    function setParentFluidContent(enabled) {
      try {
        if (!window.parent || window.parent === window || !window.parent.document?.body) return;
        const parentDocument = window.parent.document;
        const frame = window.frameElement;
        const content = frame?.closest?.(".site-content");
        const shell = frame?.closest?.(".site-shell");

        parentDocument.body.classList.toggle("league-fluid-content", Boolean(enabled));

        if (enabled) {
          parentViewportMeta = parentDocument.querySelector('meta[name="viewport"]');
          if (!parentViewportMeta) {
            parentViewportMeta = parentDocument.createElement("meta");
            parentViewportMeta.name = "viewport";
            parentDocument.head.appendChild(parentViewportMeta);
          }
          if (parentViewportPrevious === null) {
            parentViewportPrevious = parentViewportMeta.getAttribute("content") || "";
          }
          parentViewportMeta.setAttribute("content", PAGE_VIEWPORT);
        } else if (parentViewportMeta && parentViewportPrevious !== null) {
          parentViewportMeta.setAttribute("content", parentViewportPrevious);
          parentViewportPrevious = null;
          parentViewportMeta = null;
        }

        if (frame) {
          frame.style.minWidth = enabled ? "0" : "";
          frame.style.width = enabled ? "100%" : "";
          frame.style.maxWidth = enabled ? "100%" : "";
        }
        if (content) {
          content.style.minWidth = enabled ? "0" : "";
          content.style.overflowX = enabled ? "hidden" : "";
        }
        if (shell) {
          shell.style.minWidth = enabled ? "0" : "";
          shell.style.width = enabled ? "100vw" : "";
        }
      } catch (error) {
        // Direct page loads and cross-frame failures do not need parent sizing.
      }
    }

    const TEAM_LOGOS = {
      "AC Milan": "acmilan.jpg",
      "AFC Richmond": "richmond.jpg",
      "Ajax": "ajax.jpg",
      "Aston Villa": "astonvilla.jpg",
      "Atletico Madrid": "atletico.jpg",
      "Barcelona": "barcelona.jpg",
      "Bayern Munich": "bayern.jpg",
      "Benfica": "benfica.jpg",
      "Brighton": "brighton.jpg",
      "Chelsea": "chelsea.jpg",
      "Crystal Palace": "crystalpalace.jpg",
      "FL Fart": "flfart.jpg",
      "Inter Milan": "intermilan.jpg",
      "Juventus": "juventus.jpg",
      "Manchester City": "manchestercity.jpg",
      "Manchester United": "manutd.jpg",
      "Marseille": "marseille.jpg",
      "Monaco": "monaco.jpg",
      "Paris Saint-Germain": "psg.jpg",
      "Real Madrid": "realmadrid.jpg",
      "Sheffield United": "sheffield.jpg",
      "Sporting CP": "sportingcp.jpg",
      "Tottenham Hotspur": "tottenham.jpg",
      "Valencia": "valencia.jpg"
    };

    const PLAYER_MODES = [
      { id: "attributes", label: "Attributes" },
      { id: "potentials", label: "Potentials" },
      { id: "contracts", label: "Contracts" }
    ];
    const STAT_MODES = ["Season Stats", "Season Shooting", "Season Efficiency", "Career Stats", "Career Shooting", "Career Efficiency"];

    function q(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function slugify(v) {
      return String(v || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
    }

    function normalizeName(v) {
      return String(v || "")
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function toPlayerHref(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";
      const links = window.leaguePlayerPageLinks;
      if (links) {
        if (links.isClassic()) {
          return links.hrefFromAssetsHtml(raw);
        }
        const unified = links.hrefFromAssetsHtml(raw);
        if (unified !== "#") return unified;
      }
      const idMatch = raw.match(/player(\d+)\.htm/i);
      if (idMatch) return `./unified-player.htm?id=${encodeURIComponent(`player${idMatch[1]}`)}`;
      const clean = raw.replace(/^(\.\/|\.\.\/)+/, "");
      return clean ? `../../${clean}` : "";
    }

    function initials(name) {
      return String(name || "")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((p) => p[0].toUpperCase())
        .join("") || "TM";
    }

    function parseDateMMDDYYYY(v) {
      const m = String(v || "").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (!m) return null;
      return new Date(Number(m[3]), Number(m[1]) - 1, Number(m[2]));
    }

    function buildTeamLogo(teamName) {
      const slot = document.getElementById("teamLogoSlot");
      slot.innerHTML = "";
      const wrap = document.createElement("div");
      wrap.className = "logo-stack";
      const img = document.createElement("img");
      img.className = "logo";
      img.alt = teamName + " logo";
      img.src = `../../00-assets/photos/${TEAM_LOGOS[teamName] || (slugify(teamName) + ".jpg")}`;
      img.addEventListener("error", () => {
        img.src = "../../00-assets/images/ESLcropped-removebg-preview.png";
        img.classList.add("logo-fallback");
      });
      wrap.appendChild(img);

      if (state.current && state.current.rosterFile) {
        const coach = state.coachesByRoster[String(state.current.rosterFile || "").toLowerCase()];
        if (coach && coach.name && coach.href) {
          const gm = document.createElement("a");
          gm.className = "gm-link";
          gm.href = coach.href;
          gm.textContent = `GM: ${coach.name}`;
          wrap.appendChild(gm);
        }
      }

      slot.appendChild(wrap);
    }

    function headerAndRows(matrix) {
      if (!matrix || !matrix.length) return { headers: [], rows: [] };
      const headerRow = matrix.find((r) => r.length > 2 && r.some((c) => /name|stats|season|team|pos|198\d/i.test(c.text))) || matrix[0];
      const headers = headerRow.map((c, idx) => c.text || `Col ${idx + 1}`);
      const start = matrix.indexOf(headerRow) + 1;
      const rows = matrix.slice(start).filter((r) => r.some((c) => c.text || c.color));
      return { headers, rows };
    }

    function renderTable(el, headers, rows, options = {}) {
      if (!headers.length) {
        el.innerHTML = "<tr><th>Data unavailable</th></tr>";
        return;
      }
      const normalizedRows = rows.map((r) => headers.map((_, i) => r[i] || { text: "", color: "" }));
      let keepIndexes = headers.map((_, i) => i);
      keepIndexes = keepIndexes.filter((colIndex) => {
        const headerText = String(headers[colIndex] || "").trim();
        const looksPlaceholder = !headerText || /^col\s*\d+$/i.test(headerText);
        const allBlankish = normalizedRows.every((r) => {
          const c = r[colIndex] || { text: "", color: "" };
          const text = String(c.text || "").trim();
          return !text || text === "-";
        });
        return !(looksPlaceholder && allBlankish);
      });
      headers = keepIndexes.map((i) => headers[i]);
      for (let r = 0; r < normalizedRows.length; r += 1) {
        normalizedRows[r] = keepIndexes.map((i) => normalizedRows[r][i]);
      }
      while (headers.length > 1) {
        const lastIndex = headers.length - 1;
        const headerText = String(headers[lastIndex] || "").trim();
        const allEmpty = normalizedRows.every((r) => {
          const c = r[lastIndex] || { text: "", color: "" };
          return !String(c.text || "").trim() && !String(c.color || "").trim();
        });
        if (!allEmpty && !/^col\s*\d+$/i.test(headerText)) break;
        headers = headers.slice(0, -1);
        normalizedRows.forEach((r) => r.pop());
      }
      el.removeAttribute("data-striped-number-col");
      if (isNarrowForColumnPreset()) {
        if (el.id === "playerTable" && el.classList.contains("has-number-first") && headers.length > 2) {
          headers = headers.slice(1);
          for (let r = 0; r < normalizedRows.length; r += 1) {
            normalizedRows[r] = normalizedRows[r].slice(1);
          }
          el.classList.remove("has-number-first");
        } else if (el.id === "statsTable" && headers.length > 2 && findNameColumnIndex(headers) === 1) {
          headers = headers.slice(1);
          for (let r = 0; r < normalizedRows.length; r += 1) {
            normalizedRows[r] = normalizedRows[r].slice(1);
          }
          el.dataset.stripedNumberCol = "1";
        }
      }
      const narrowEssential =
        isNarrowForColumnPreset() &&
        state.columnPreset === "essential" &&
        (el.id === "playerTable" || el.id === "statsTable") &&
        headers.length > 2;
      if (narrowEssential) {
        const ni =
          Number.isInteger(options.nameColumnIndex) && options.nameColumnIndex >= 0
            ? options.nameColumnIndex
            : findNameColumnIndex(headers);
        const idx = essentialColumnIndices(headers, ni);
        if (idx.length < headers.length) {
          headers = idx.map((i) => headers[i]);
          for (let r = 0; r < normalizedRows.length; r += 1) {
            normalizedRows[r] = idx.map((i) => normalizedRows[r][i]);
          }
        }
      }
      const resolvedNameCol = findNameColumnIndex(headers);
      const nameColIdx =
        resolvedNameCol >= 0
          ? resolvedNameCol
          : Number.isInteger(options.nameColumnIndex) &&
              options.nameColumnIndex >= 0 &&
              options.nameColumnIndex < headers.length
            ? options.nameColumnIndex
            : -1;
      const head = `<thead><tr>${headers.map((h) => `<th>${h || "-"}</th>`).join("")}</tr></thead>`;
      const bodyRows = normalizedRows.length
        ? normalizedRows.map((r) => `<tr>${headers.map((_, i) => {
            const cell = r[i] || { text: "", color: "" };
            if (!cell.text && cell.color) {
              return `<td><span class="dot" style="background:${cell.color}"></span></td>`;
            }
            const text = cell.text || "-";
            if (nameColIdx === i && text !== "-") {
              const href = toPlayerHref(cell.href) || resolvePlayerHref(text);
              if (href) {
                return `<td><a class="player-name-link" href="${href}">${text}</a></td>`;
              }
            }
            return `<td>${text}</td>`;
          }).join("")}</tr>`).join("")
        : `<tr><td colspan="${headers.length}">No rows</td></tr>`;
      el.innerHTML = `${head}<tbody>${bodyRows}</tbody>`;
      makeTableSortable(el);
    }

    function resolvePlayerHref(name) {
      const key = normalizeName(name);
      if (!key) return "";
      const currentTeamName = state.current ? state.current.teamName : "";
      const teamMatch = (state.players || []).find((p) => normalizeName(p.name) === key && normalizeName(p.teamLabel) === normalizeName(currentTeamName));
      const fallback = teamMatch || (state.players || []).find((p) => normalizeName(p.name) === key);
      const rawUrl = String((fallback && fallback.url) || "").trim();
      if (!rawUrl) return "";
      return toPlayerHref(rawUrl);
    }

    function findNameColumnIndex(headers) {
      return headers.findIndex((h) => /^name$/i.test(String(h || "").trim()));
    }

    function parseSortableValue(text) {
      const raw = String(text || "").trim();
      if (!raw || raw === "-") return { type: "empty", value: Number.NEGATIVE_INFINITY };
      const numeric = raw
        .replace(/[$,%]/g, "")
        .replace(/,/g, "")
        .replace(/[^\d.+-]/g, "");
      const n = Number(numeric);
      if (Number.isFinite(n) && numeric !== "") return { type: "number", value: n };
      return { type: "text", value: raw.toLowerCase() };
    }

    function parseNumericCell(text) {
      const raw = String(text || "").trim();
      if (!raw || raw === "-") return null;
      const cleaned = raw
        .replace(/[$,%]/g, "")
        .replace(/,/g, "")
        .replace(/[^\d.+-]/g, "");
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : null;
    }

    function makeTableSortable(table) {
      const headerCells = Array.from(table.querySelectorAll("thead th"));
      const tbody = table.querySelector("tbody");
      if (!tbody || !headerCells.length) return;
      headerCells.forEach((th, colIndex) => {
        th.addEventListener("click", () => {
          const nextDir = th.classList.contains("sort-asc") ? "desc" : "asc";
          headerCells.forEach((h) => h.classList.remove("sort-asc", "sort-desc"));
          th.classList.add(nextDir === "asc" ? "sort-asc" : "sort-desc");
          const rows = Array.from(tbody.querySelectorAll("tr"));
          rows.sort((a, b) => {
            const aText = (a.children[colIndex] || {}).textContent || "";
            const bText = (b.children[colIndex] || {}).textContent || "";
            const av = parseSortableValue(aText);
            const bv = parseSortableValue(bText);
            if (av.type === "number" && bv.type === "number") {
              return nextDir === "asc" ? av.value - bv.value : bv.value - av.value;
            }
            const cmp = String(av.value).localeCompare(String(bv.value), undefined, { numeric: true, sensitivity: "base" });
            return nextDir === "asc" ? cmp : -cmp;
          });
          rows.forEach((r) => tbody.appendChild(r));
        });
      });
    }

    function highlightStatLeaders(table, fixedTextColumns = 2) {
      const bodyRows = Array.from(table.querySelectorAll("tbody tr"));
      if (!bodyRows.length) return;
      bodyRows.forEach((row) => row.querySelectorAll("td").forEach((td) => td.classList.remove("stat-leader")));
      const columnCount = bodyRows[0].children.length;
      for (let col = fixedTextColumns; col < columnCount; col += 1) {
        let max = null;
        const values = bodyRows.map((row) => parseNumericCell((row.children[col] || {}).textContent));
        values.forEach((v) => {
          if (v === null) return;
          if (max === null || v > max) max = v;
        });
        if (max === null) continue;
        bodyRows.forEach((row, idx) => {
          if (values[idx] === max) {
            row.children[col].classList.add("stat-leader");
          }
        });
      }
    }

    function renderPlayerTable() {
      const table = document.getElementById("playerTable");
      table.classList.remove("has-number-first");
      if (state.playerMode === "contracts") {
        const { headers, rows } = headerAndRows(state.parsedSections["Contract"]);
        renderTable(table, headers, rows, { nameColumnIndex: findNameColumnIndex(headers) });
        return;
      }
      if (state.playerMode === "potentials") {
        table.classList.add("has-number-first");
        const { headers, rows } = headerAndRows(state.parsedSections["Potentials"]);
        renderTable(table, headers, rows, { nameColumnIndex: findNameColumnIndex(headers) });
        return;
      }
      const attr = headerAndRows(state.parsedSections["Attributes"]);
      if (!attr.headers.length) {
        renderTable(table, [], []);
        return;
      }
      table.classList.add("has-number-first");
      renderTable(table, attr.headers, attr.rows, { nameColumnIndex: findNameColumnIndex(attr.headers) });
    }

    function renderStatsTable() {
      const table = document.getElementById("statsTable");
      const { headers, rows } = headerAndRows(state.parsedSections[state.statsMode]);
      renderTable(table, headers, rows, { nameColumnIndex: findNameColumnIndex(headers) });
      const leaderFix = table.dataset.stripedNumberCol === "1" ? 1 : 2;
      highlightStatLeaders(table, leaderFix);
    }

    let columnPresetShellBound = false;
    let columnPresetResizeTimer = null;

    function syncColumnPresetButtons() {
      document.querySelectorAll(".preset-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.preset === state.columnPreset);
      });
    }

    function onColumnPresetBarClick(e) {
      const btn = e.target.closest(".preset-btn");
      if (!btn) return;
      const preset = btn.dataset.preset;
      if (preset !== "essential" && preset !== "full") return;
      if (state.columnPreset === preset) return;
      state.columnPreset = preset;
      try {
        localStorage.setItem(COLUMN_PRESET_KEY, preset);
      } catch {
        /* ignore */
      }
      syncColumnPresetButtons();
      renderPlayerTable();
      renderStatsTable();
    }

    function bindColumnPresetControls() {
      const shell = document.querySelector(".shell");
      if (!shell || columnPresetShellBound) return;
      columnPresetShellBound = true;
      shell.addEventListener("click", onColumnPresetBarClick);
      window.addEventListener("resize", () => {
        clearTimeout(columnPresetResizeTimer);
        columnPresetResizeTimer = setTimeout(() => {
          renderPlayerTable();
          renderStatsTable();
        }, 180);
      });
    }

    function renderSeasonInfoTable() {
      const table = document.getElementById("seasonInfoTable");
      const { headers, rows } = headerAndRows(state.parsedSections["Season Info"]);
      renderTable(table, headers, rows);
    }

    function renderTabs(containerId, items, activeId, onClick) {
      const root = document.getElementById(containerId);
      root.innerHTML = items.map((it) => `<button type="button" class="tab-btn${it.id === activeId || it === activeId ? " active" : ""}" data-id="${it.id || it}">${it.label || it}</button>`).join("");
      root.querySelectorAll(".tab-btn").forEach((btn) => btn.addEventListener("click", () => onClick(btn.dataset.id)));
    }

    function renderHeroInjuryPills() {
      const root = document.getElementById("heroInjuryPills");
      if (!root || !state.current) return;
      const targetFile = String(state.current.rosterFile || "").toLowerCase();
      const entries = (state.injuries || [])
        .filter((item) => String(item.rosterUrl || "").toLowerCase().includes(targetFile))
        .sort((a, b) => Number(b.length || 0) - Number(a.length || 0))
        .slice(0, 5);
      if (!entries.length) {
        root.innerHTML = `<span class="injury-pill"><span>No active injuries</span></span>`;
        return;
      }
      root.innerHTML = entries.map((item) => {
        const player = (state.players || []).find((p) => normalizeName(p.name) === normalizeName(item.name) && normalizeName(p.teamLabel) === normalizeName(state.current.teamName));
        const href = toPlayerHref(player && player.url);
        const nameHtml = href ? `<a href="${href}">${item.name || "Unknown Player"}</a>` : `<span>${item.name || "Unknown Player"}</span>`;
        return `<span class="injury-pill">${nameHtml}<span>${item.injury || "Injury"}</span><span class="injury-pill-days">${item.length || 0}d</span></span>`;
      }).join("");
    }

    function collectTeamGames(teamId) {
      const days = state.scheduleSections.flatMap((sec) => sec.days || []);
      return days.flatMap((d) => (d.games || []).filter((g) => g.homeTeam === teamId || g.awayTeam === teamId).map((g) => ({ ...g, dateObj: parseDateMMDDYYYY(d.date), date: d.date })));
    }

    function monthKey(dateObj) {
      return `${dateObj.getFullYear()}-${dateObj.getMonth()}`;
    }

    function scheduleBoxHref(game) {
      const boxHref = String(game.boxscoreUrl || "").replace(/^\.\/+/, "");
      return boxHref ? `../../${boxHref}` : "";
    }

    function scheduleOpponentLogo(oppName) {
      const logoFile = TEAM_LOGOS[oppName];
      if (logoFile) {
        return `<img class="mini-logo" src="../../00-assets/photos/${logoFile}" alt="${oppName}">`;
      }
      return `<span class="mini-logo-fallback">${initials(oppName)}</span>`;
    }

    function syncScheduleViewControls() {
      const isList = state.scheduleView === "list";
      document.getElementById("scheduleCalendar").hidden = isList;
      document.getElementById("scheduleList").hidden = !isList;
      document.querySelectorAll("[data-schedule-view]").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.scheduleView === state.scheduleView);
      });
      document.getElementById("prevMonth").disabled = isList;
      document.getElementById("nextMonth").disabled = isList;
    }

    function renderScheduleList(games) {
      const teamId = state.current.teamId;
      const rows = games.map((g) => {
        const isHome = g.homeTeam === teamId;
        const isCompleted = Number.isFinite(Number(g.homeScore)) && Number.isFinite(Number(g.awayScore));
        const oppName = isHome ? g.awayTeamName : g.homeTeamName;
        const myScore = isHome ? g.homeScore : g.awayScore;
        const oppScore = isHome ? g.awayScore : g.homeScore;
        const boxHref = scheduleBoxHref(g);
        const dateText = g.dateObj.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
        const resultText = isCompleted ? `${g.winner === teamId ? "W" : "L"} ${myScore}-${oppScore}` : "TBD";
        const resultHtml = boxHref && isCompleted ? `<a href="${boxHref}">${resultText}</a>` : resultText;
        return `<div class="schedule-list-row ${isHome ? "home" : "away"}"><div class="schedule-list-date">${dateText}</div><div class="schedule-list-ha">${isHome ? "Home" : "Away"}</div><div class="schedule-list-opponent">${scheduleOpponentLogo(oppName)}<span>${oppName}</span></div><div class="schedule-list-result">${resultHtml}</div></div>`;
      });
      document.getElementById("scheduleList").innerHTML = rows.join("");
    }

    function renderSchedule() {
      renderCalendar();
      syncScheduleViewControls();
    }

    function renderCalendar() {
      const teamId = state.current.teamId;
      const games = collectTeamGames(teamId).filter((g) => g.dateObj);
      const status = document.getElementById("scheduleStatus");
      if (!games.length) {
        status.textContent = "No schedule data";
        document.getElementById("dayGrid").innerHTML = "";
        document.getElementById("scheduleList").innerHTML = "";
        return;
      }
      games.sort((a, b) => a.dateObj - b.dateObj);
      renderScheduleList(games);
      if (!state.monthCursor) {
        const completedGames = games.filter((g) =>
          Number.isFinite(Number(g.homeScore)) && Number.isFinite(Number(g.awayScore))
        );
        if (completedGames.length) {
          const anchor = completedGames[completedGames.length - 1];
          state.monthCursor = new Date(anchor.dateObj.getFullYear(), anchor.dateObj.getMonth(), 1);
        } else {
          const octoberGame = games.find((g) => g.dateObj.getMonth() === 9);
          const fallback = octoberGame || games[games.length - 1];
          state.monthCursor = new Date(fallback.dateObj.getFullYear(), fallback.dateObj.getMonth(), 1);
        }
      }
      const first = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth(), 1);
      const sundayFirst = first.getDay();
      const startWeekday = sundayFirst === 0 ? 6 : sundayFirst - 1;
      const totalCells = 42;
      const gridStart = new Date(first);
      gridStart.setDate(first.getDate() - startWeekday);
      const weekdays = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
      document.getElementById("weekdayRow").innerHTML = weekdays.map((d) => `<div class="weekday">${d}</div>`).join("");
      document.getElementById("monthTitle").textContent = first.toLocaleDateString(undefined, { month: "long", year: "numeric" });
      const byDate = new Map();
      games.forEach((g) => {
        const key = g.dateObj.toDateString();
        if (!byDate.has(key)) byDate.set(key, []);
        byDate.get(key).push(g);
      });
      const cells = [];
      for (let i = 0; i < totalCells; i += 1) {
        const d = new Date(gridStart);
        d.setDate(gridStart.getDate() + i);
        const key = d.toDateString();
        const inMonth = d.getMonth() === first.getMonth();
        const dayGames = byDate.get(key) || [];
        let numClass = "";
        let numText = String(d.getDate());
        if (dayGames.length) {
          const firstGame = dayGames[0];
          const isHomeGame = firstGame.homeTeam === teamId;
          const isCompleted = Number.isFinite(Number(firstGame.homeScore)) && Number.isFinite(Number(firstGame.awayScore));
          if (isCompleted) {
            const isWin = firstGame.winner === teamId;
            const myScore = firstGame.homeTeam === teamId ? firstGame.homeScore : firstGame.awayScore;
            const oppScore = firstGame.homeTeam === teamId ? firstGame.awayScore : firstGame.homeScore;
            numClass = isHomeGame ? "home" : "away";
            const boxHref = scheduleBoxHref(firstGame);
            const scoreLabel = `${myScore}-${oppScore}`;
            const scoreHtml = boxHref
              ? `<a class="day-num-score-link" href="${boxHref}">${scoreLabel}</a>`
              : scoreLabel;
            numText = `<span class="day-num-result">${isWin ? "W" : "L"}</span><span class="day-num-score">${scoreHtml}</span>`;
          } else {
            numClass = isHomeGame ? "home" : "away";
          }
        }
        const logosHtml = dayGames.slice(0, 2).map((g) => {
          const isHome = g.homeTeam === teamId;
          const oppName = isHome ? g.awayTeamName : g.homeTeamName;
          return scheduleOpponentLogo(oppName);
        }).join("");
        cells.push(`<div class="day-cell ${inMonth ? "" : "out"}"><div class="day-num ${numClass}">${numText}</div><div class="mini-logo-row">${logosHtml}</div></div>`);
      }
      document.getElementById("dayGrid").innerHTML = cells.join("");
      status.textContent = `${games.length} games loaded`;
    }

    function setPickerAndHeader() {
      const picker = document.getElementById("teamPicker");
      picker.innerHTML = state.teamDirectory
        .map((t) => `<option value="${t.rosterFile}" ${t.rosterFile === state.current.rosterFile ? "selected" : ""}>${t.teamName}</option>`)
        .join("");
      const sub = `${state.current.league.replace(/\s+Standings$/i, "")}: ${state.current.record} | Diff ${state.current.diff > 0 ? "+" : ""}${state.current.diff} | ${state.current.streak}`;
      document.getElementById("teamName").textContent = `${state.current.teamName} ${state.current.record}`;
      document.getElementById("teamSubtitle").textContent = sub;
      buildTeamLogo(state.current.teamName);
      picker.addEventListener("change", () => {
        const selected = state.teamDirectory.find((t) => t.rosterFile === picker.value);
        if (!selected) return;
        const params = new URLSearchParams(window.location.search);
        params.set("file", selected.rosterFile);
        params.delete("team");
        window.location.search = params.toString();
      });
    }

    async function loadCurrentTeamBundle() {
      const bundle = await window.UnifiedRosterDataService.loadTeamBundle(state.current.rosterFile, STAT_MODES);
      document.documentElement.style.setProperty("--team-color", bundle.colors.main);
      document.documentElement.style.setProperty("--team-color-2", bundle.colors.secondary);
      state.parsedSections = bundle.parsedSections;
      state.monthCursor = null;
    }

    async function init() {
      try {
        setParentFluidContent(true);
        const base = await window.UnifiedRosterDataService.loadBaseData();
        state.standings = base.standings;
        state.teams = base.teams;
        state.players = base.players;
        state.playerStats = base.playerStats;
        state.scheduleSections = base.scheduleSections;
        state.injuries = base.injuries;
        state.coachesByRoster = base.coachesByRoster;
        state.teamDirectory = window.UnifiedRosterDataService.buildTeamDirectory(state.standings);
        state.current = window.UnifiedRosterDataService.findTeamFromQuery(state.teamDirectory, window.location.search);
        if (!state.current) throw new Error("No team found");
        await loadCurrentTeamBundle();
        setPickerAndHeader();
        renderHeroInjuryPills();
        const onPlayerTab = (id) => {
          state.playerMode = id;
          renderPlayerTable();
          renderTabs("playerTabs", PLAYER_MODES, state.playerMode, onPlayerTab);
        };
        const onStatsTab = (id) => {
          state.statsMode = id;
          renderStatsTable();
          renderTabs("statsTabs", STAT_MODES, state.statsMode, onStatsTab);
        };
        renderTabs("playerTabs", PLAYER_MODES, state.playerMode, onPlayerTab);
        renderTabs("statsTabs", STAT_MODES, state.statsMode, onStatsTab);
        renderSeasonInfoTable();
        renderPlayerTable();
        renderStatsTable();
        renderSchedule();
        syncColumnPresetButtons();
        bindColumnPresetControls();
        document.querySelectorAll("[data-schedule-view]").forEach((btn) => {
          btn.addEventListener("click", () => {
            state.scheduleView = btn.dataset.scheduleView === "list" ? "list" : "calendar";
            renderSchedule();
          });
        });
        document.getElementById("prevMonth").addEventListener("click", () => {
          if (!state.monthCursor) return;
          state.monthCursor = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth() - 1, 1);
          renderSchedule();
        });
        document.getElementById("nextMonth").addEventListener("click", () => {
          if (!state.monthCursor) return;
          state.monthCursor = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth() + 1, 1);
          renderSchedule();
        });
      } catch (err) {
        document.getElementById("teamName").textContent = "Unified roster unavailable";
        document.getElementById("teamSubtitle").textContent = "Could not load required data.";
      }
    }
    window.addEventListener("pagehide", () => setParentFluidContent(false));
    window.addEventListener("beforeunload", () => setParentFluidContent(false));
    init();
  </script>
</body>
</html>
